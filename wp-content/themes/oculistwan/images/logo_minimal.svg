<?xml version="1.0" encoding="UTF-8"?>
<svg width="280" height="80" viewBox="0 0 280 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 简洁渐变 -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1c9765"/>
      <stop offset="100%" style="stop-color:#11adba"/>
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    
    <!-- 微妙阴影 -->
    <filter id="subtleShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
  </defs>
  
  <!-- 极简图标 -->
  <g transform="translate(40,40)">
    <!-- 外圆 - 简洁边框 -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#primaryGrad)" stroke-width="2.5" opacity="0.8"/>
    
    <!-- 内部眼睛设计 - 极简风格 -->
    <g>
      <!-- 眼睛轮廓 - 简化设计 -->
      <ellipse cx="0" cy="0" rx="18" ry="10" fill="none" stroke="url(#primaryGrad)" stroke-width="2"/>
      
      <!-- 瞳孔 - 渐变填充 -->
      <circle cx="0" cy="0" r="6" fill="url(#primaryGrad)"/>
      
      <!-- 高光点 -->
      <circle cx="-2" cy="-2" r="2" fill="url(#accentGrad)"/>
      
      <!-- 创意光束 - 极简线条 -->
      <g opacity="0.6">
        <line x1="-12" y1="0" x2="-20" y2="0" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="0" x2="20" y2="0" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- 科技感装饰点 -->
    <circle cx="20" cy="-15" r="1.5" fill="url(#accentGrad)" opacity="0.7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-20" cy="15" r="1.5" fill="url(#primaryGrad)" opacity="0.7">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 现代化文字 -->
  <g transform="translate(85,40)">
    <!-- 主品牌名 - 粗体现代字体 -->
    <text x="0" y="-8" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" 
          font-size="22" font-weight="600" fill="url(#primaryGrad)" filter="url(#subtleShadow)">
      万道红
    </text>
    
    <!-- 副标题 - 轻量字体 -->
    <text x="0" y="8" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" 
          font-size="11" font-weight="300" fill="#666" letter-spacing="0.5px">
      屈光性白内障工作室
    </text>
    
    <!-- 英文标识 - 等宽字体科技感 -->
    <text x="0" y="22" font-family="'SF Mono', 'Monaco', monospace" 
          font-size="8" fill="url(#accentGrad)" letter-spacing="2px" opacity="0.8">
      REFRACTIVE CATARACT
    </text>
  </g>
  
  <!-- 极简装饰元素 -->
  <g transform="translate(240,40)" opacity="0.4">
    <!-- 简洁几何形状 -->
    <circle cx="0" cy="-10" r="2" fill="url(#primaryGrad)"/>
    <rect x="-1" y="5" width="2" height="8" fill="url(#accentGrad)" rx="1"/>
    <polygon points="10,-5 15,0 10,5" fill="url(#primaryGrad)"/>
  </g>
  
  <!-- 底部标语线 -->
  <line x1="85" y1="65" x2="200" y2="65" stroke="url(#primaryGrad)" stroke-width="0.5" opacity="0.3"/>
  <text x="85" y="75" font-family="'SF Pro Display', Arial, sans-serif" 
        font-size="7" fill="#999" opacity="0.7" letter-spacing="1px">
    PRECISION • INNOVATION • EXCELLENCE
  </text>
</svg>