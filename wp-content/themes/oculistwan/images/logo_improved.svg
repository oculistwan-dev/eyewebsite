<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="100" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 专业医疗蓝绿色渐变 -->
    <linearGradient id="medicalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1c9765"/>
      <stop offset="100%" style="stop-color:#11adba"/>
    </linearGradient>
    
    <!-- 简洁背景渐变 -->
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f9f4"/>
    </linearGradient>
  </defs>
  
  <!-- 简洁背景 -->
  <rect x="0" y="0" width="320" height="100" rx="5" ry="5" fill="url(#backgroundGradient)"/>
  
  <!-- 主要图标区域 -->
  <g transform="translate(50,50)">
    <!-- 简化的眼睛图标 - 专业医疗风格 -->
    <g>
      <!-- 眼睛外形 - 简洁圆润 -->
      <path d="M -25,0 Q -25,-15 0,-15 Q 25,-15 25,0 Q 25,15 0,15 Q -25,15 -25,0 Z" 
            fill="white" stroke="url(#medicalGradient)" stroke-width="3"/>
      
      <!-- 虹膜 - 专业医疗蓝绿色 -->
      <circle cx="0" cy="0" r="10" fill="url(#medicalGradient)"/>
      
      <!-- 瞳孔 - 简洁白色 -->
      <circle cx="0" cy="0" r="4" fill="white"/>
      
      <!-- 反光点 - 增加立体感 -->
      <circle cx="-2" cy="-2" r="2" fill="white" opacity="0.8"/>
      
      <!-- 十字医疗元素 - 体现医疗专业性 -->
      <g opacity="0.7" stroke="white" stroke-width="1.5">
        <line x1="-5" y1="0" x2="5" y2="0"/>
        <line x1="0" y1="-5" x2="0" y2="5"/>
      </g>
    </g>
  </g>
  
  <!-- 文字区域 - 简洁专业 -->
  <g transform="translate(120,50)">
    <!-- 主标题 - 专业清晰 -->
    <text x="0" y="0" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="500" fill="#1c9765">
      万道红
    </text>
    
    <!-- 副标题 - 简洁明了 -->
    <text x="0" y="20" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#666">
      屈光性白内障工作室
    </text>
    
    <!-- 英文标题 - 专业医疗风格 -->
    <text x="0" y="38" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#999" letter-spacing="0.5px">
      REFRACTIVE CATARACT STUDIO
    </text>
    
    <!-- 分隔线 -->
    <line x1="0" y1="48" x2="120" y2="48" stroke="url(#medicalGradient)" stroke-width="1" opacity="0.7"/>
  </g>
</svg>