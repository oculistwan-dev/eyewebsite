<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="100" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 蓝绿色渐变 - 匹配网站风格 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c9765"/>
      <stop offset="100%" style="stop-color:#11adba"/>
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#269a65"/>
      <stop offset="100%" style="stop-color:#11adba"/>
    </linearGradient>
    
    <!-- 柔和阴影 -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- 主要图标区域 -->
  <g transform="translate(50,50)">
    <!-- 简洁圆环 - 蓝绿色调 -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#mainGradient)" stroke-width="3" opacity="0.9"/>
    
    <!-- 中心眼睛图标 - 匹配网站蓝绿色调 -->
    <g filter="url(#softShadow)">
      <!-- 眼睛外形 - 优雅曲线 -->
      <path d="M -20,0 Q -20,-10 0,-10 Q 20,-10 20,0 Q 20,10 0,10 Q -20,10 -20,0 Z" 
            fill="url(#mainGradient)" stroke="#ffffff" stroke-width="1.5"/>
      
      <!-- 虹膜 - 纯色设计 -->
      <circle cx="0" cy="0" r="7" fill="#ffffff" opacity="1"/>
      
      <!-- 瞳孔 - 蓝绿色调 -->
      <circle cx="0" cy="0" r="3.5" fill="#1c9765"/>
      
      <!-- 反光点 -->
      <circle cx="-1" cy="-1" r="1" fill="#ffffff"/>
    </g>
    
    <!-- 简洁装饰线 - 蓝绿色调 -->
    <g opacity="0.7">
      <line x1="-18" y1="0" x2="-26" y2="0" stroke="url(#mainGradient)" stroke-width="2" stroke-linecap="round"/>
      <line x1="18" y1="0" x2="26" y2="0" stroke="url(#mainGradient)" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- 文字设计 - 简洁清晰 -->
  <g transform="translate(120,50)">
    <!-- 主标题 - 加粗现代字体 - 蓝绿色调 -->
    <text x="0" y="-12" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" fill="#1c9765">
      万道红
    </text>
    
    <!-- 副标题 - 清晰易读 -->
    <text x="0" y="8" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" fill="#5f6368">
      屈光性白内障工作室
    </text>
    
    <!-- 英文标题 - 简洁 - 蓝绿色调 -->
    <text x="0" y="23" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1c9765" letter-spacing="0.8px" font-weight="500">
      REFRACTIVE CATARACT STUDIO
    </text>
    
    <!-- 装饰线条 - 蓝绿色调 -->
    <line x1="0" y1="30" x2="85" y2="30" stroke="#1c9765" stroke-width="1" opacity="0.5"/>
  </g>
</svg>