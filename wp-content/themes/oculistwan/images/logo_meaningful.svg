<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变光圈设计 - 版本3 -->
  <defs>
    <!-- 多色渐变 -->
    <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <!-- 橙色渐变 -->
    <linearGradient id="warmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    
    <!-- 外发光 -->
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 三层同心圆设计 -->
  <g transform="translate(30, 30)">
    <!-- 外圈 -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#rainbowGradient)" 
            stroke-width="1.5" opacity="0.4" stroke-dasharray="4,2"/>
    
    <!-- 中圈 -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="url(#rainbowGradient)" 
            stroke-width="2" opacity="0.6"/>
    
    <!-- 眼睛形状 -->
    <path d="M -12 0 Q 0 -8, 12 0 Q 0 8, -12 0 Z" 
          fill="url(#rainbowGradient)" opacity="0.25"/>
    
    <!-- 虹膜 -->
    <circle cx="0" cy="0" r="7" fill="url(#warmGradient)" opacity="0.7" 
            filter="url(#outerGlow)"/>
    
    <!-- 瞳孔 -->
    <circle cx="0" cy="0" r="3.5" fill="#5856d6"/>
    <circle cx="2" cy="-1.5" r="1.2" fill="#ffffff" opacity="0.85"/>
    
    <!-- 装饰弧线 -->
    <path d="M -8 -8 Q -4 -12, 0 -10" fill="none" stroke="url(#rainbowGradient)" 
          stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <path d="M 8 8 Q 4 12, 0 10" fill="none" stroke="url(#rainbowGradient)" 
          stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  </g>
  
  <!-- 文字部分 -->
  <g transform="translate(68, 20)">
    <text x="0" y="12" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="19" font-weight="700" fill="url(#rainbowGradient)">
      万道红
    </text>
    
    <text x="0" y="28" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="9" fill="#555" letter-spacing="1">
      屈光性白内障工作室
    </text>
  </g>
  
  <!-- 装饰元素 -->
  <circle cx="65" cy="50" r="1.5" fill="url(#rainbowGradient)" opacity="0.6"/>
  <circle cx="185" cy="25" r="1" fill="url(#warmGradient)" opacity="0.5"/>
</svg>
