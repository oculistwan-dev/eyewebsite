<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c9765;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#269a65;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#11adba;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c42;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 阴影效果 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="60" cy="60" r="45" fill="url(#primaryGradient)" filter="url(#shadow)" opacity="0.1"/>
  
  <!-- 创意眼睛图标 -->
  <g transform="translate(60,60)">
    <!-- 外眼轮廓 -->
    <ellipse cx="0" cy="0" rx="35" ry="20" fill="none" stroke="url(#primaryGradient)" stroke-width="3" filter="url(#glow)"/>
    
    <!-- 内眼球 -->
    <circle cx="0" cy="0" r="15" fill="url(#primaryGradient)" opacity="0.8"/>
    
    <!-- 瞳孔 -->
    <circle cx="0" cy="0" r="8" fill="#ffffff"/>
    
    <!-- 光点反射 -->
    <circle cx="-3" cy="-3" r="3" fill="url(#accentGradient)"/>
    
    <!-- 创意光线 -->
    <g opacity="0.7">
      <line x1="-25" y1="-15" x2="-35" y2="-20" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
      <line x1="25" y1="-15" x2="35" y2="-20" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
      <line x1="-25" y1="15" x2="-35" y2="20" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
      <line x1="25" y1="15" x2="35" y2="20" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    </g>
    
    <!-- 科技感圆环 -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.5" stroke-dasharray="5,5">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 0 0" to="360 0 0" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 主标题 -->
  <text x="130" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="url(#primaryGradient)" filter="url(#shadow)">
    万道红
  </text>
  
  <!-- 副标题 -->
  <text x="130" y="55" font-family="Arial, sans-serif" font-size="14" fill="#666">
    屈光性白内障工作室
  </text>
  
  <!-- 英文标题 -->
  <text x="130" y="75" font-family="Arial, sans-serif" font-size="10" fill="url(#accentGradient)" font-style="italic">
    REFRACTIVE CATARACT STUDIO
  </text>
  
  <!-- 创意装饰元素 -->
  <g opacity="0.3">
    <!-- 几何装饰 -->
    <polygon points="130,85 140,95 130,105 120,95" fill="url(#primaryGradient)"/>
    <circle cx="150" cy="95" r="3" fill="url(#accentGradient)"/>
    <rect x="160" y="92" width="6" height="6" fill="url(#primaryGradient)" transform="rotate(45 163 95)"/>
  </g>
  
  <!-- 底部标语 -->
  <text x="130" y="110" font-family="Arial, sans-serif" font-size="8" fill="#999" opacity="0.8">
    专业 · 精准 · 创新
  </text>
</svg>